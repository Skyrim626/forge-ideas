  <circle cx="242" cy="62"  r="3.5" fill="#c8ff00" opacity="0.65"/>
  <circle cx="246" cy="92"  r="3"   fill="#c8ff00" opacity="0.5"/>
  <circle cx="258" cy="72"  r="2"   fill="#c8ff00" opacity="0.35"/>
